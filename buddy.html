<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StEEvE-V01">
<meta name="theme-color" content="#F5E6D0">
<link rel="manifest" href="manifest.json">
<title>StEEvE-V01</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; }

body {
  background: #F5E6D0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.5s ease;
  position: relative;
  height: 100dvh;
}

/* ── TOP BAR ── */
#top-bar {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  z-index: 30;
}
#back-link {
  font-family: 'Courier New', monospace;
  font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
  color: rgba(0,0,0,0.18); text-decoration: none; text-transform: uppercase;
  transition: color 0.5s;
}
#back-link:active { color: rgba(0,0,0,0.4); }
body.dark #back-link { color: rgba(255,255,255,0.2); }
body.dark #back-link:active { color: rgba(255,255,255,0.5); }
body.dark #ble-btn { color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }
body.dark #ble-btn.live { color: rgba(255,255,255,0.5); }
body.dark #ble-dot { background: rgba(255,255,255,0.15); }
body.dark #face-hint { color: rgba(255,255,255,0.15); }
body.dark #mood-name { color: rgba(255,255,255,0.15); }
body.dark #speech-bubble { background: rgba(20,20,30,0.85); color: #e0e0e0; }
body.dark #speech-bubble::after { border-top-color: rgba(20,20,30,0.85); }
body.dark .cmd-pill { color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }
body.dark #mic-btn { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); }

/* ── BLE BUTTON — real <button> for Web Bluetooth ── */
#ble-btn {
  font-family: 'Courier New', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(0,0,0,0.3);
  background: rgba(0,0,0,0.06);
  border: none; outline: none;
  padding: 6px 12px;
  border-radius: 14px;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  -webkit-appearance: none; appearance: none;
  transition: all 0.3s;
}
#ble-btn:active { background: rgba(0,0,0,0.12); }
#ble-btn.live { color: rgba(0,0,0,0.45); }
#ble-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(0,0,0,0.15);
  transition: all 0.3s; flex-shrink: 0;
}
#ble-dot.live { background: #06d6a0; box-shadow: 0 0 6px rgba(6,214,160,0.6); }

/* ── FACE HINT ── */
#face-hint {
  position: fixed; top: 48px; right: 16px;
  font-family: 'Courier New', monospace;
  font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(0,0,0,0.12); z-index: 20; pointer-events: none;
  opacity: 0; transition: opacity 0.5s;
}
#face-hint.show { opacity: 1; }

/* ── SPEECH BUBBLE — wraps, stays longer ── */
#speech-bubble {
  position: fixed;
  top: 12%;
  left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.88);
  border-radius: 18px;
  padding: 12px 22px;
  font-family: 'Courier New', monospace;
  font-size: 15px; font-weight: 700; line-height: 1.5;
  color: #333;
  white-space: normal; word-wrap: break-word;
  z-index: 25; pointer-events: none;
  opacity: 0; transition: opacity 0.5s;
  max-width: 85vw; min-width: 60px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
#speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -10px; left: 50%; transform: translateX(-50%);
  border: 7px solid transparent;
  border-top-color: rgba(255,255,255,0.88);
  border-bottom: none;
}
#speech-bubble.show { opacity: 1; }
@media (orientation: landscape) {
  #speech-bubble { top: auto; bottom: 15%; max-width: 50vw; font-size: 14px; }
}

/* ── MOOD LABEL ── */
#mood-name {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
  font-family: 'Courier New', monospace;
  font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(0,0,0,0.14); z-index: 10; pointer-events: none; white-space: nowrap;
}
@media (orientation: landscape) { #mood-name { bottom: 10px; } }

/* ── FACE CONTAINER ── */
#face-wrap {
  width: min(88vw, 72vh);
  height: min(88vw, 72vh);
  position: relative;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  flex-shrink: 0;
}
@media (orientation: landscape) {
  #face-wrap { width: min(70vh, 55vw); height: min(70vh, 55vw); }
}
.face-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  transition: opacity 0.35s;
}
.face-svg.hidden { opacity: 0; pointer-events: none; }
#flash-overlay {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0); pointer-events: none;
  transition: background 0.15s; z-index: 5; border-radius: 12px;
}
#flash-overlay.flash { background: rgba(255,255,255,0.5); }

/* ── MIC ── */
#mic-btn {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(0,0,0,0.1); border: 2px solid rgba(0,0,0,0.12);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 20;
  transition: background 0.2s, transform 0.1s;
}
#mic-btn:active { transform: translateX(-50%) scale(0.93); }
#mic-btn.listening {
  background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.5);
  animation: mic-pulse 1s infinite;
}
@keyframes mic-pulse { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.08)} }
@media (orientation: landscape) {
  #mic-btn { bottom: 10px; right: 16px; left: auto; transform: none; }
  #mic-btn:active { transform: scale(0.93); }
  #mic-btn.listening { animation: mic-lp 1s infinite; }
  @keyframes mic-lp { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
}

/* ── COMMAND BAR ── */
#cmd-bar {
  position: fixed; bottom: 70px;
  left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 20;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
#cmd-bar.show { opacity: 1; pointer-events: auto; }
@media (orientation: landscape) {
  #cmd-bar { bottom: auto; top: 50%; left: auto; right: 14px; transform: translateY(-50%); flex-direction: column; }
}
.cmd-pill {
  font-family: 'Courier New', monospace;
  font-size: 11px; font-weight: 700;
  color: rgba(0,0,0,0.4); background: rgba(255,255,255,0.45);
  border: 1.5px solid rgba(0,0,0,0.08); border-radius: 14px;
  padding: 6px 14px; cursor: pointer;
  transition: all 0.12s; user-select: none; -webkit-user-select: none;
}
.cmd-pill:active { background: rgba(255,255,255,0.8); transform: scale(0.92); }

/* ── ANIMATIONS ── */
@keyframes float  { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-5px)} }
@keyframes scan   { 0%,100%{transform:translateX(-4px)} 50%{transform:translateX(4px)} }
@keyframes glow-p { 0%,100%{opacity:0.7}               50%{opacity:1} }
@keyframes squish { 0%,100%{transform:scaleY(1) scaleX(1)} 50%{transform:scaleY(0.96) scaleX(1.03)} }
.anim-float  { animation: float  3.2s ease-in-out infinite; }
.anim-scan   { animation: scan   2.6s ease-in-out infinite; }
.anim-glow   { animation: glow-p 2.0s ease-in-out infinite; }
.anim-squish { animation: squish 4.0s ease-in-out infinite; }
</style>

<script>
// ══════════════════════════════════════════════════════════════
//  BLE — real <button> onclick for Web Bluetooth gesture trust
// ══════════════════════════════════════════════════════════════
const UART_SVC='6e400001-b5a3-f393-e0a9-e50e24dcca9e'
const UART_TX='6e400003-b5a3-f393-e0a9-e50e24dcca9e'
const UART_RX='6e400002-b5a3-f393-e0a9-e50e24dcca9e'
let bleTx=null,bleRx=null,bleDevice=null,bleConnected=false

async function toggleBLE(){
  if(bleConnected){
    if(bleDevice&&bleDevice.gatt.connected)bleDevice.gatt.disconnect()
    onBLEOff(); return
  }
  try{
    setBLE('scanning...')
    bleDevice=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'BBC micro:bit'}],optionalServices:[UART_SVC]})
    bleDevice.addEventListener('gattserverdisconnected',onBLEOff)
    const srv=await bleDevice.gatt.connect()
    const svc=await srv.getPrimaryService(UART_SVC)
    bleTx=await svc.getCharacteristic(UART_TX)
    bleRx=await svc.getCharacteristic(UART_RX)
    await bleRx.startNotifications()
    bleRx.addEventListener('characteristicvaluechanged',onSensor)
    bleConnected=true
    setBLE(bleDevice.name||'connected',true)
    showBubble('linked up!')
    applyMood('excited')
    setTimeout(()=>applyMood('happy'),1800)
    document.getElementById('cmd-bar').classList.add('show')
    cmdCh.postMessage({type:'buddy-ble',status:'connected'})
  }catch(e){setBLE('connect');onBLEOff()}
}
function onBLEOff(){
  bleTx=null;bleRx=null;bleConnected=false;setBLE('connect')
  document.getElementById('cmd-bar').classList.remove('show')
  cmdCh.postMessage({type:'buddy-ble',status:'disconnected'})
}
function setBLE(label,live){
  document.getElementById('ble-label').textContent=label
  document.getElementById('ble-dot').classList.toggle('live',!!live)
  document.getElementById('ble-btn').classList.toggle('live',!!live)
}
function sendBLE(cmd){
  if(!bleTx)return false
  bleTx.writeValue(new TextEncoder().encode(cmd+'#')).catch(()=>{})
  return true
}
function onSensor(e){
  const raw=new TextDecoder().decode(e.target.value).replace('#','')
  const p=raw.split('|')
  if(p[0]!=='SENSOR')return
  const d=parseInt(p[1])||0
  if(d>0&&d<=8&&currentMood==='moving'){
    sendBLE('S');applyMood('surprised');showBubble('woah! too close!')
    setTimeout(()=>applyMood('happy'),2500)
  }
}

// ── COMMAND DISPATCH ─────────────────────────────────────────
function sendCmd(cmd){if(sendBLE(cmd))return true;cmdCh.postMessage({type:'drive',cmd});return true}
let moveTimer=null
function timedMove(cmd,ms){
  clearTimeout(moveTimer);sendCmd(cmd);applyMood('moving');showBubble(heardPhrase(cmd))
  moveTimer=setTimeout(()=>{sendCmd('S');applyMood('happy')},ms||800)
}

// ── BROADCAST CHANNEL ────────────────────────────────────────
const cmdCh=new BroadcastChannel('robot-commands')
cmdCh.onmessage=e=>{
  if(e.data.type==='drive-ack'){
    const c=e.data.cmd
    if(c!=='S'){applyMood('moving');showBubble(heardPhrase(c));setTimeout(()=>{if(currentMood==='moving')applyMood('happy')},1500)}
  }
}

// ── COMMAND PILLS ────────────────────────────────────────────
document.querySelectorAll('.cmd-pill').forEach(pill=>{
  const cmd=pill.dataset.cmd;let ht=null
  function go(e){e.preventDefault();pill.style.transform='scale(0.9)'
    if(cmd==='S'){sendCmd('S');clearTimeout(moveTimer);applyMood('happy');showBubble('stopping!')}
    else{sendCmd(cmd);applyMood('moving');showBubble(heardPhrase(cmd));ht=setInterval(()=>sendCmd(cmd),150)}
  }
  function stop(e){e.preventDefault();pill.style.transform='';clearInterval(ht)
    if(cmd!=='S'){sendCmd('S');setTimeout(()=>{if(currentMood==='moving')applyMood('happy')},300)}
  }
  pill.addEventListener('pointerdown',go)
  pill.addEventListener('pointerup',stop)
  pill.addEventListener('pointerleave',stop)
  pill.addEventListener('pointercancel',stop)
})

function bcMouth(t){
  const m={w:'M90,132 Q95,139 100,132 Q105,139 110,132',W:'M86,130 Q91,141 96,130 Q101,141 106,130 Q111,141 114,130',
    '-':'M88,134 L112,134',o:'M96,132 Q100,137 104,132',O:'M92,130 Q100,142 108,130',
    u:'M92,132 Q100,140 108,132',n:'M90,136 Q100,130 110,136',v:'M90,130 L100,138 L110,130'}
  return m[t]||m.w
}
function blMouth(t){
  const m={w:'M90,128 Q100,138 110,128',W:'M85,126 Q100,142 115,126','-':'M88,130 L112,130',
    o:'M96,128 Q100,133 104,128',O:'M90,126 Q100,142 110,126',u:'M88,128 Q100,140 112,128',
    n:'M90,133 Q100,126 110,133',v:'M90,126 L100,135 L110,126'}
  return m[t]||m.w
}

let currentMood='happy',currentFace='boxcat',priorMood='happy',isAngry=false
let blinkTimer,idleTimer,angryTimer
const FACES=['boxcat','cozmo','blob']
const FACE_LABELS={boxcat:'boxcat',cozmo:'cozmo eyes',blob:'blob friend'}

function applyMood(mood){
  const m=MOODS[mood];if(!m)return;currentMood=mood
  const bg=(currentFace==='cozmo'&&m.czBg)?m.czBg:m.bg
  document.body.style.background=bg
  document.body.classList.toggle('dark',currentFace==='cozmo')
  document.getElementById('mood-name').textContent=m.label
  document.querySelector('meta[name="theme-color"]').setAttribute('content',bg)
  if(currentFace==='boxcat')applyBC(m)
  else if(currentFace==='cozmo')applyCZ(m)
  else if(currentFace==='blob')applyBL(m)
}

function applyBC(m){
  sa('bc-eye-l','ry',m.eyeRy);sa('bc-eye-r','ry',m.eyeRy)
  sa('bc-shine-l','cy',110-m.eyeRy*0.4);sa('bc-shine-r','cy',110-m.eyeRy*0.4)
  sa('bc-lid-l','height',m.lidH);sa('bc-lid-r','height',m.lidH)
  const lidCol=m.bg==='#F0A8A8'?'#C89080':'#D4A574'
  sa('bc-lid-l','fill',lidCol);sa('bc-lid-r','fill',lidCol)
  sa('bc-blush-l','opacity',m.blush);sa('bc-blush-r','opacity',m.blush)
  sa('bc-zzz','opacity',m.zzz);sa('bc-sweat','opacity',m.sweat)
  sa('bc-sparkle-l','opacity',m.spark);sa('bc-sparkle-r','opacity',m.spark)
  const me=document.getElementById('bc-mouth');if(me)me.setAttribute('d',bcMouth(m.mouth))
}

function applyCZ(m){
  sa('cz-eye-l','fill',m.czCol);sa('cz-eye-r','fill',m.czCol)
  sa('cz-eye-l','height',m.czH);sa('cz-eye-r','height',m.czH)
  sa('cz-lid-l','height',m.czLid);sa('cz-lid-r','height',m.czLid)
  sa('cz-lid-l','fill',m.czBg||'#0e1018');sa('cz-lid-r','fill',m.czBg||'#0e1018')
}

function applyBL(m){
  sa('bl-body','fill',m.blCol)
  const hl=document.getElementById('bl-highlight');if(hl)hl.setAttribute('fill',lHex(m.blCol,30))
  sa('bl-arm-l','fill',dHex(m.blCol,15));sa('bl-arm-r','fill',dHex(m.blCol,15))
  sa('bl-lid-l','fill',m.blCol);sa('bl-lid-r','fill',m.blCol)
  sa('bl-pupil-l','r',m.blPup);sa('bl-pupil-r','r',m.blPup)
  sa('bl-cheek-l','opacity',m.blCh);sa('bl-cheek-r','opacity',m.blCh)
  sa('bl-zzz','opacity',m.zzz);sa('bl-sweat','opacity',m.sweat)
  sa('bl-sparkle-l','opacity',m.spark);sa('bl-sparkle-r','opacity',m.spark)
  const me=document.getElementById('bl-mouth');if(me)me.setAttribute('d',blMouth(m.mouth))
}

function lHex(h,a){const n=parseInt(h.slice(1),16);return '#'+((1<<24)+(Math.min(255,(n>>16)+a)<<16)+(Math.min(255,((n>>8)&0xFF)+a)<<8)+Math.min(255,(n&0xFF)+a)).toString(16).slice(1)}
function dHex(h,a){return lHex(h,-a)}
function sa(id,attr,val){const el=document.getElementById(id);if(el)el.setAttribute(attr,val)}

// ── FACE SWAP ────────────────────────────────────────────────
function swapFace(){
  currentFace=FACES[(FACES.indexOf(currentFace)+1)%FACES.length]
  FACES.forEach(f=>{const e=document.getElementById('face-'+f);if(e)e.classList.toggle('hidden',f!==currentFace)})
  const fl=document.getElementById('flash-overlay');fl.classList.add('flash');setTimeout(()=>fl.classList.remove('flash'),250)
  const h=document.getElementById('face-hint');h.textContent=FACE_LABELS[currentFace];h.classList.add('show');setTimeout(()=>h.classList.remove('show'),2000)
  applyMood(currentMood)
}

// ── BLINK ────────────────────────────────────────────────────
function blink(){
  if(currentMood==='sleepy'||isAngry)return
  if(currentFace==='boxcat'){
    const fr=[0,8,20,28,20,8,0];let i=0
    const t=setInterval(()=>{sa('bc-lid-l','height',fr[i]);sa('bc-lid-r','height',fr[i]);i++;if(i>=fr.length){clearInterval(t);sa('bc-lid-l','height',MOODS[currentMood].lidH);sa('bc-lid-r','height',MOODS[currentMood].lidH)}},30)
  }else if(currentFace==='cozmo'){
    const fr=[0,22,55,92,55,22,0];let i=0
    const t=setInterval(()=>{sa('cz-lid-l','height',fr[i]);sa('cz-lid-r','height',fr[i]);i++;if(i>=fr.length){clearInterval(t);sa('cz-lid-l','height',MOODS[currentMood].czLid);sa('cz-lid-r','height',MOODS[currentMood].czLid)}},30)
  }else if(currentFace==='blob'){
    sa('bl-lid-l','opacity',1);sa('bl-lid-r','opacity',1)
    setTimeout(()=>{sa('bl-lid-l','opacity',0);sa('bl-lid-r','opacity',0)},180)
  }
}
function scheduleBlink(){clearTimeout(blinkTimer);blinkTimer=setTimeout(()=>{blink();scheduleBlink()},2500+Math.random()*3500)}

// ── ANGRY ────────────────────────────────────────────────────
function triggerAngry(){
  if(isAngry)return;isAngry=true;priorMood=currentMood
  clearTimeout(idleTimer);clearTimeout(blinkTimer)
  applyMood('angry');showBubble(moodPhrase('angry'))
  if(bleConnected)sendBLE('SCRIPT:WIGGLE')
  angryTimer=setTimeout(()=>{isAngry=false;applyMood(priorMood);scheduleBlink();scheduleIdle()},5000)
}

// ── IDLE DRIFT ───────────────────────────────────────────────
function scheduleIdle(){
  clearTimeout(idleTimer)
  idleTimer=setTimeout(()=>{
    if(!isAngry&&currentMood==='happy'){
      const p=Math.random()<0.5?'thinking':'sleepy';applyMood(p)
      setTimeout(()=>{applyMood('happy');scheduleIdle()},4000)
    }else scheduleIdle()
  },10000+Math.random()*8000)
}

// ── GESTURES ─────────────────────────────────────────────────
const TAP_MOODS=['excited','surprised','love']
let tapCount=0,tapTimer=null,tapLock=false,pressTimer=null,pressStarted=false
const LONG_MS=600,DBL_MS=300
const wrap=document.getElementById('face-wrap')
wrap.addEventListener('pointerdown',e=>{e.preventDefault();pressStarted=true;pressTimer=setTimeout(()=>{pressStarted=false;tapCount=0;clearTimeout(tapTimer);swapFace()},LONG_MS)})
wrap.addEventListener('pointerup',e=>{

    else{

      const r=TAP_MOODS[Math.floor(Math.random()*TAP_MOODS.length)]
      applyMood(r);showBubble(moodPhrase(r))
      if(r==='excited'&&bleConnected)sendBLE('H')
      setTimeout(()=>{applyMood('happy');scheduleIdle();tapLock=false},2500)
    }

wrap.addEventListener('pointercancel',()=>{clearTimeout(pressTimer);pressStarted=false})

// ══════════════════════════════════════════════════════════════
//  PERSONALITY ENGINE + BUBBLES
// ══════════════════════════════════════════════════════════════
const PHRASES={
  happy:['beep boop!','hello human!','i like you :)','fun fun fun!','yay!'],
  excited:['WOOOOO!','let\'s gooo!','zoom zoom!','!!!','so fast!','YESSS!'],
  thinking:['hmmmm...','calculating...','one moment...','...','processing!'],
  sleepy:['zzz...','so tired...','*yawn*','need recharge','battery low'],
  surprised:['oh!','woah!!','what?!','*bzzzt*','did not expect!'],
  love:['<3 <3 <3','best human!','hehe~','you\'re great!','beep beep <3'],
  moving:['vroom!','wheee!','going fast!','zoom!','clear the way!'],
  sad:['...','oh no','low energy',':\'(','need a hug?'],
  angry:['BZZZT!!','DOES NOT COMPUTE','ERROR!','grrrr!!','>:('],
}

let personality=null,recentPhrases=[],lastBreakTime=0
const RECENT_MAX=12,BREAK_CD=30*60*1000

function moodPhrase(mood){
  const pool=(personality&&personality.mood_phrases&&personality.mood_phrases[mood])?personality.mood_phrases[mood]:(PHRASES[mood]||PHRASES.happy)
  return pool[Math.floor(Math.random()*pool.length)]
}

fetch('personality.json').then(r=>r.json()).then(d=>{personality=d;console.log('StEEvE personality loaded')}).catch(()=>{})

function getTimePeriod(){
  if(!personality)return 'work_am';const h=new Date().getHours()
  for(const[k,p]of Object.entries(personality.time_periods)){
    if(p.start<p.end){if(h>=p.start&&h<p.end)return k}else{if(h>=p.start||h<p.end)return k}
  }return 'work_am'
}
function pickCat(per){
  const w=personality.category_weights[per];if(!w)return 'idle'
  const a={...w};if(Date.now()-lastBreakTime<BREAK_CD)a.break=0
  const t=Object.values(a).reduce((s,v)=>s+v,0);if(t===0)return 'idle'
  let r=Math.random()*t;for(const[c,v]of Object.entries(a)){r-=v;if(r<=0)return c}return 'idle'
}
function pickPhrase(cat,per){
  const cs=personality.categories[cat];if(!cs)return null
  let pool=cs[per]||cs['_default']||[];if(!pool.length)pool=cs['_default']||[];if(!pool.length)return null
  let avail=pool.filter(p=>!recentPhrases.includes(p))
  if(!avail.length){recentPhrases=recentPhrases.filter(p=>!pool.includes(p));avail=pool}
  const ph=avail[Math.floor(Math.random()*avail.length)]
  recentPhrases.push(ph);if(recentPhrases.length>RECENT_MAX)recentPhrases.shift()
  return ph
}
function getPB(){
  if(!personality)return null;const per=getTimePeriod(),cat=pickCat(per),ph=pickPhrase(cat,per)
  if(!ph)return null;if(cat==='break')lastBreakTime=Date.now()
  return{phrase:ph,mood:(personality.category_moods&&personality.category_moods[cat])||'happy',category:cat}
}

let bubbleTimer=null
function showBubble(text,dur){
  const el=document.getElementById('speech-bubble');el.textContent=text;el.classList.add('show')
  clearTimeout(bubbleTimer)
  const ms=dur||Math.max(4000,Math.min(text.length*100,9000))
  bubbleTimer=setTimeout(()=>{el.classList.remove('show');scheduleBubble()},ms)
}
function scheduleBubble(){
  clearTimeout(bubbleTimer)
  bubbleTimer=setTimeout(()=>{
    if(isAngry){scheduleBubble();return}
    const pb=getPB()
    if(pb){
      const prev=currentMood;applyMood(pb.mood);showBubble(pb.phrase)
      setTimeout(()=>{if(currentMood===pb.mood&&!isAngry)applyMood(prev)},Math.max(4000,pb.phrase.length*100)+600)
    }else showBubble(moodPhrase(currentMood))
  },10000+Math.random()*15000)
}

// ── VOICE ────────────────────────────────────────────────────
const VMAP={'forward':'F','forwards':'F','go':'F','back':'B','backward':'B','backwards':'B','reverse':'B',
  'left':'L','turn left':'L','right':'R','turn right':'R','stop':'S','halt':'S','freeze':'S',
  'horn':'H','beep':'H','honk':'H','wiggle':'SCRIPT:WIGGLE','dance':'SCRIPT:WIGGLE','spin':'SCRIPT:SPIN','square':'SCRIPT:SQUARE'}
let recog=null,micOn=false
function setupSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition
  if(!SR){document.getElementById('mic-btn').style.opacity='0.3';return}
  recog=new SR();recog.continuous=false;recog.interimResults=false;recog.lang='en-US';recog.maxAlternatives=3
  recog.onresult=e=>{
    for(let a=0;a<e.results[0].length;a++){
      const h=e.results[0][a].transcript.toLowerCase().trim(),cmd=VMAP[h]||VMAP[h.split(' ')[0]]
      if(cmd){
        if(cmd.startsWith('SCRIPT:')){sendCmd(cmd);applyMood('excited');showBubble('let\'s gooo!');setTimeout(()=>applyMood('happy'),3000)}
        else if(cmd==='S'){sendCmd('S');clearTimeout(moveTimer);applyMood('happy');showBubble('stopping!')}
        else if(cmd==='H'){sendCmd('H');showBubble('beep beep!')}
        else timedMove(cmd,800)
        break
      }
    }
    stopMic()
  }
  recog.onerror=()=>stopMic();recog.onend=()=>stopMic()
}
function heardPhrase(c){return{F:'going forward!',B:'reversing!',L:'turning left!',R:'turning right!',S:'stopping!',H:'beep beep!'}[c]||'ok!'}
function toggleMic(){micOn?stopMic():startMic()}
function startMic(){if(!recog)return;micOn=true;document.getElementById('mic-btn').classList.add('listening');showBubble('listening...');try{recog.start()}catch(e){stopMic()}}
function stopMic(){micOn=false;document.getElementById('mic-btn').classList.remove('listening');try{recog.stop()}catch(e){}}

// ── INIT ─────────────────────────────────────────────────────
setupSpeech();applyMood('happy');scheduleBlink();scheduleIdle();scheduleBubble()
</script>

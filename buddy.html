<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Buddy">
<meta name="theme-color" content="#FFD166">
<link rel="manifest" href="manifest.json">
<title>BUDDY</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; }

body {
  background: #FFD166;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: background 0.4s ease;
  position: relative;
  height: 100dvh;
  gap: 0;
}

#back-link {
  position: fixed; top: 18px; left: 20px;
  font-family: 'Courier New', monospace;
  font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
  color: rgba(0,0,0,0.2); text-decoration: none; text-transform: uppercase; z-index: 10;
}
#back-link:active { color: rgba(0,0,0,0.5); }

#swap-hint {
  position: fixed; top: 18px; right: 20px;
  font-family: 'Courier New', monospace;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(0,0,0,0.18); z-index: 10; pointer-events: none;
  opacity: 0; transition: opacity 0.4s;
}
#swap-hint.show { opacity: 1; }

#mood-name {
  position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
  font-family: 'Courier New', monospace;
  font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(0,0,0,0.18); z-index: 10; pointer-events: none; white-space: nowrap;
}

/* ── SPEECH BUBBLE ── */
#speech-bubble {
  position: fixed;
  top: 10%;
  left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.92);
  border-radius: 20px;
  padding: 10px 18px;
  font-family: 'Courier New', monospace;
  font-size: 14px; font-weight: 700;
  color: #333;
  white-space: nowrap;
  z-index: 20;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
  max-width: 80vw;
  text-align: center;
}
#speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -10px; left: 50%; transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: rgba(255,255,255,0.92);
  border-bottom: none;
}
#speech-bubble.show { opacity: 1; }

/* ── MIC BUTTON ── */
#mic-btn {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(0,0,0,0.12); border: 2px solid rgba(0,0,0,0.15);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 20;
  transition: background 0.2s, transform 0.1s;
}
#mic-btn:active { transform: translateX(-50%) scale(0.93); }
#mic-btn.listening {
  background: rgba(239,68,68,0.25);
  border-color: rgba(239,68,68,0.5);
  animation: mic-pulse 1s infinite;
}
@keyframes mic-pulse { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.08)} }
#mic-icon { width: 20px; height: 20px; }

/* ── FACE WRAP ── */
#face-wrap {
  width: min(78vw, 64vh);
  height: min(78vw, 64vh);
  position: relative;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  flex-shrink: 0;
}
.face-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  transition: opacity 0.3s;
}
.face-svg.hidden { opacity: 0; pointer-events: none; }

#flash-ring {
  position: absolute; inset: -4px; border-radius: 50%;
  border: 4px solid rgba(255,255,255,0);
  pointer-events: none; transition: border-color 0.15s; z-index: 5;
}
#flash-ring.flash { border-color: rgba(255,255,255,0.8); }

/* Robot face LED scan animation */
@keyframes scan-l {
  0%,100% { transform: translateX(0); }
  50%      { transform: translateX(6px); }
}
@keyframes scan-r {
  0%,100% { transform: translateX(0); }
  50%      { transform: translateX(-6px); }
}
.r-scan-l { animation: scan-l 2.4s ease-in-out infinite; }
.r-scan-r { animation: scan-r 2.4s ease-in-out infinite; }
</style>
</head>
<body>

<script>
// ══════════════════════════════════════════════════════════════
//  BROADCAST CHANNEL — sends voice commands to index.html
//  index.html listens on the same channel name and calls send()
// ══════════════════════════════════════════════════════════════
const cmdChannel = new BroadcastChannel('robot-commands')

// ══════════════════════════════════════════════════════════════
//  MOOD DEFINITIONS
// ══════════════════════════════════════════════════════════════
const MOODS = {
  happy: {
    bg:'#FFD166', bowFill:'#FF9AAC', bowKnot:'#FF6B8A',
    eyeLry:18, eyeRry:18, lidH:2, cheekOp:0,
    browRotL:0, browRotR:0,
    sparkOp:0, zzzOp:0, sweatOp:0,
    rEyeColour:'#06d6a0', rSegs:[1,1,1,1,1,1,1], rAntenna:'#06d6a0',
    label:'happy',
  },
  excited: {
    bg:'#FFD166', bowFill:'#FF6B8A', bowKnot:'#E8445A',
    eyeLry:22, eyeRry:22, lidH:2, cheekOp:0.7,
    browRotL:0, browRotR:0,
    sparkOp:0, zzzOp:0, sweatOp:0,
    rEyeColour:'#FFD166', rSegs:[1,0,1,0,1,0,1], rAntenna:'#FFD166',
    label:'excited!',
  },
  thinking: {
    bg:'#C7EFCF', bowFill:'#A8D8B0', bowKnot:'#6DBF7E',
    eyeLry:14, eyeRry:16, lidH:8, cheekOp:0,
    browRotL:-4, browRotR:4,
    sparkOp:0, zzzOp:0, sweatOp:0,
    rEyeColour:'#A8D8B0', rSegs:[0,1,0,1,0,1,0], rAntenna:'#A8D8B0',
    label:'thinking...',
  },
  sleepy: {
    bg:'#B8C0FF', bowFill:'#C0C8FF', bowKnot:'#9098E8',
    eyeLry:7, eyeRry:7, lidH:20, cheekOp:0,
    browRotL:0, browRotR:0,
    sparkOp:0, zzzOp:1, sweatOp:0,
    rEyeColour:'#9098E8', rSegs:[1,0,0,0,0,0,1], rAntenna:'#9098E8',
    label:'sleepy zzz',
  },
  surprised: {
    bg:'#FFBE7B', bowFill:'#FFB347', bowKnot:'#E8922A',
    eyeLry:24, eyeRry:24, lidH:2, cheekOp:0.5,
    browRotL:6, browRotR:-6,
    sparkOp:0, zzzOp:0, sweatOp:1,
    rEyeColour:'#FFBE7B', rSegs:[1,1,0,0,1,1,0], rAntenna:'#FFBE7B',
    label:'woah!',
  },
  love: {
    bg:'#FFB3C6', bowFill:'#FF6B8A', bowKnot:'#E8445A',
    eyeLry:18, eyeRry:18, lidH:2, cheekOp:0.85,
    browRotL:0, browRotR:0,
    sparkOp:1, zzzOp:0, sweatOp:0,
    rEyeColour:'#FF6B8A', rSegs:[1,1,1,1,1,1,1], rAntenna:'#FF6B8A',
    label:'hehe',
  },
  moving: {
    bg:'#A8E6CF', bowFill:'#6DBF9E', bowKnot:'#3DAA7E',
    eyeLry:16, eyeRry:16, lidH:5, cheekOp:0.4,
    browRotL:-2, browRotR:2,
    sparkOp:0, zzzOp:0, sweatOp:0,
    rEyeColour:'#3DAA7E', rSegs:[1,1,1,0,1,1,1], rAntenna:'#3DAA7E',
    label:'vroom!',
  },
  sad: {
    bg:'#CFD8E8', bowFill:'#A0AEC0', bowKnot:'#718096',
    eyeLry:13, eyeRry:13, lidH:12, cheekOp:0,
    browRotL:5, browRotR:-5,
    sparkOp:0, zzzOp:0, sweatOp:0,
    rEyeColour:'#718096', rSegs:[1,0,0,0,0,0,1], rAntenna:'#718096',
    label:'aww...',
  },
  angry: {
    bg:'#FF6B6B', bowFill:'#CC2244', bowKnot:'#991133',
    eyeLry:12, eyeRry:12, lidH:14, cheekOp:0,
    browRotL:20, browRotR:-20,
    sparkOp:0, zzzOp:0, sweatOp:0,
    rEyeColour:'#ef4444', rSegs:[1,1,0,0,0,1,1], rAntenna:'#ef4444',
    label:'GRRRR!!',
  },
}

// ══════════════════════════════════════════════════════════════
//  SPEECH BUBBLES — random phrases per mood
// ══════════════════════════════════════════════════════════════
const PHRASES = {
  happy:    ['beep boop!', 'hello human!', 'i like you :)', 'brrr zap!', 'fun fun fun!', 'yay!'],
  excited:  ['WOOOOO!', 'let\'s gooo!', 'zoom zoom!', '!!!', 'so fast!'],
  thinking: ['hmmmm...', 'calculating...', 'one moment...', '...', 'processing!'],
  sleepy:   ['zzz...', 'so tired...', '*yawn*', 'need recharge', 'battery low'],
  surprised:['oh!', 'woah!!', 'what?!', '*bzzzt*', 'did not expect'],
  love:     ['<3 <3 <3', 'best human!', 'hehe~', 'you\'re great!', 'beep beep <3'],
  moving:   ['vroom!', 'wheee!', 'going fast!', 'zoom!', 'clear the way!'],
  sad:      ['...', 'oh no', 'low energy', ':\'(', 'need a hug?'],
  angry:    ['BZZZT!!', 'DOES NOT COMPUTE', 'ERROR!', 'grrrr!!', '>:('],
}

let bubbleTimer = null
let bubbleVisible = false

function showBubble(text) {
  const el = document.getElementById('speech-bubble')
  el.textContent = text
  el.classList.add('show')
  bubbleVisible = true
  clearTimeout(bubbleTimer)
  bubbleTimer = setTimeout(() => {
    el.classList.remove('show')
    bubbleVisible = false
    scheduleBubble()
  }, 3200)
}

function scheduleBubble() {
  clearTimeout(bubbleTimer)
  bubbleTimer = setTimeout(() => {
    if (!isAngry) {
      const pool = PHRASES[currentMood] || PHRASES.happy
      const phrase = pool[Math.floor(Math.random() * pool.length)]
      showBubble(phrase)
    } else {
      scheduleBubble()
    }
  }, 15000 + Math.random() * 15000)
}

// ══════════════════════════════════════════════════════════════
//  APPLY MOOD
// ══════════════════════════════════════════════════════════════
let currentMood = 'happy'
let currentFace = 'kitty'
let priorMood   = 'happy'
let isAngry     = false
let blinkTimer, idleTimer, angryTimer

function applyMood(mood) {
  const m = MOODS[mood]
  if (!m) return
  currentMood = mood
  document.body.style.background = m.bg
  document.getElementById('mood-name').textContent = m.label
  document.querySelector('meta[name="theme-color"]').setAttribute('content', m.bg)
  if (currentFace === 'kitty') applyKitty(m)
  else                         applyRobot(m)
}

// ── KITTY RENDERER ────────────────────────────────────────────
function applyKitty(m) {
  const bg = m.bg
  sa('k-lid-l','fill',bg); sa('k-lid-r','fill',bg)
  sa('k-lid-l','height',m.lidH); sa('k-lid-r','height',m.lidH)
  sa('k-eyeball-l','ry',m.eyeLry); sa('k-eyeball-r','ry',m.eyeRry)
  sa('k-shine-l','cy', 130 - m.eyeLry * 0.4)
  sa('k-shine-r','cy', 130 - m.eyeRry * 0.4)
  sa('k-cheek-l','opacity',m.cheekOp); sa('k-cheek-r','opacity',m.cheekOp)
  document.querySelectorAll('#k-bow ellipse').forEach(el => el.setAttribute('fill', m.bowFill))
  document.querySelector('#k-bow circle').setAttribute('fill', m.bowKnot)
  document.querySelectorAll('#k-sparkle-l line,#k-sparkle-r line').forEach(l => l.setAttribute('stroke', m.bowFill))
  sa('k-sparkle-l','opacity',m.sparkOp); sa('k-sparkle-r','opacity',m.sparkOp)
  sa('k-zzz','opacity',m.zzzOp); sa('k-sweat','opacity',m.sweatOp)
  sa('k-angry-brows','opacity', Math.abs(m.browRotL) >= 20 ? 1 : 0)
}

// ── ROBOT RENDERER ────────────────────────────────────────────
function applyRobot(m) {
  const c = m.rEyeColour
  // Eye glow colour
  sa('r-eye-l-glow','fill',c); sa('r-eye-r-glow','fill',c)
  sa('r-scan-l','fill',c); sa('r-scan-r','fill',c)
  sa('r-nose','fill',c)
  sa('r-antenna-dot','fill',c)
  // Lid — matches head colour (#2C2C2A) always, creates blink
  sa('r-lid-l','fill','#2C2C2A'); sa('r-lid-r','fill','#2C2C2A')
  sa('r-lid-l','height',m.lidH); sa('r-lid-r','height',m.lidH)
  // Segments — each either bright or dim
  m.rSegs.forEach((on, i) => sa(`r-seg-${i}`, 'opacity', on ? 0.9 : 0.08))
  // Segment colour matches eye
  for (let i=0;i<7;i++) sa(`r-seg-${i}`,'fill',c)
  // Extras
  sa('r-zzz','opacity',m.zzzOp)
}

function sa(id, attr, val) {
  const el = document.getElementById(id)
  if (el) el.setAttribute(attr, val)
}

// ══════════════════════════════════════════════════════════════
//  FACE SWAP
// ══════════════════════════════════════════════════════════════
function swapFace() {
  currentFace = currentFace === 'kitty' ? 'robot' : 'kitty'
  document.getElementById('face-kitty').classList.toggle('hidden', currentFace !== 'kitty')
  document.getElementById('face-robot').classList.toggle('hidden', currentFace !== 'robot')
  const ring = document.getElementById('flash-ring')
  ring.classList.add('flash')
  setTimeout(() => ring.classList.remove('flash'), 300)
  const hint = document.getElementById('swap-hint')
  hint.textContent = currentFace === 'kitty' ? 'kitty mode' : 'robot mode'
  hint.classList.add('show')
  setTimeout(() => hint.classList.remove('show'), 1800)
  applyMood(currentMood)
}

// ══════════════════════════════════════════════════════════════
//  ANGRY
// ══════════════════════════════════════════════════════════════
function triggerAngry() {
  if (isAngry) return
  isAngry = true; priorMood = currentMood
  clearTimeout(idleTimer); clearTimeout(blinkTimer)
  applyMood('angry')
  showBubble(PHRASES.angry[Math.floor(Math.random()*PHRASES.angry.length)])
  angryTimer = setTimeout(() => {
    isAngry = false
    applyMood(priorMood)
    scheduleBlink(); scheduleIdle()
  }, 5000)
}

// ══════════════════════════════════════════════════════════════
//  BLINK
// ══════════════════════════════════════════════════════════════
function blink() {
  if (currentMood === 'sleepy' || isAngry) return
  const m     = MOODS[currentMood]
  const isRobot = currentFace === 'robot'
  // Robot eyes are 44px tall (y:76 to y:120), kitty eyes up to ~24ry
  const maxClose = isRobot ? 44 : Math.max(m.eyeLry * 1.1, 18)
  const frames   = isRobot
    ? [2, 10, 24, 44, 24, 10, 2]
    : [2, 6, 14, maxClose, 14, 6, 2]
  const prefix   = isRobot ? 'r' : 'k'
  let i = 0
  const t = setInterval(() => {
    sa(`${prefix}-lid-l`, 'height', frames[i])
    sa(`${prefix}-lid-r`, 'height', frames[i])
    i++
    if (i >= frames.length) {
      clearInterval(t)
      sa(`${prefix}-lid-l`, 'height', m.lidH)
      sa(`${prefix}-lid-r`, 'height', m.lidH)
    }
  }, 32)
}

function scheduleBlink() {
  clearTimeout(blinkTimer)
  blinkTimer = setTimeout(() => { blink(); scheduleBlink() }, 2500 + Math.random() * 3000)
}

// ══════════════════════════════════════════════════════════════
//  IDLE DRIFT
// ══════════════════════════════════════════════════════════════
function scheduleIdle() {
  clearTimeout(idleTimer)
  idleTimer = setTimeout(() => {
    if (!isAngry && currentMood === 'happy') {
      const pick = Math.random() < 0.5 ? 'thinking' : 'sleepy'
      applyMood(pick)
      setTimeout(() => { applyMood('happy'); scheduleIdle() }, 4000)
    } else { scheduleIdle() }
  }, 10000 + Math.random() * 8000)
}

// ══════════════════════════════════════════════════════════════
//  GESTURES — single tap, double tap, long press
// ══════════════════════════════════════════════════════════════
const TAP_MOODS = ['excited', 'surprised', 'love']
let tapCount=0, tapTimer=null, tapLock=false
let pressTimer=null, pressStarted=false
const LONG_MS=600, DBL_MS=300
const wrap = document.getElementById('face-wrap')

wrap.addEventListener('pointerdown', e => {
  e.preventDefault(); pressStarted = true
  pressTimer = setTimeout(() => {
    pressStarted=false; tapCount=0; clearTimeout(tapTimer); swapFace()
  }, LONG_MS)
})
wrap.addEventListener('pointerup', e => {
  e.preventDefault()
  if (!pressStarted) return
  clearTimeout(pressTimer); pressStarted=false
  tapCount++; clearTimeout(tapTimer)
  tapTimer = setTimeout(() => {
    const c=tapCount; tapCount=0
    if (c>=2) { triggerAngry() }
    else {
      if (tapLock||isAngry) return
      tapLock=true; clearTimeout(idleTimer)
      const r=TAP_MOODS[Math.floor(Math.random()*TAP_MOODS.length)]
      applyMood(r)
      const p=PHRASES[r]
      showBubble(p[Math.floor(Math.random()*p.length)])
      setTimeout(()=>{ applyMood('happy'); scheduleIdle(); tapLock=false }, 2000)
    }
  }, DBL_MS)
})
wrap.addEventListener('pointercancel',()=>{ clearTimeout(pressTimer); pressStarted=false })

// ══════════════════════════════════════════════════════════════
//  VOICE COMMANDS — Web Speech API
//  Recognised: forward, back, backward, left, right, stop, horn
//  Commands broadcast to index.html via BroadcastChannel.
//  index.html just needs to listen and call send().
// ══════════════════════════════════════════════════════════════
const VOICE_MAP = {
  'forward':  'F', 'forwards': 'F', 'go':       'F',
  'back':     'B', 'backward': 'B', 'backwards':'B', 'reverse':'B',
  'left':     'L', 'turn left':'L',
  'right':    'R', 'turn right':'R',
  'stop':     'S', 'halt':     'S', 'freeze':   'S',
  'horn':     'H', 'beep':     'H', 'honk':     'H',
}

let recognition = null
let micActive   = false

function setupSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition
  if (!SR) {
    document.getElementById('mic-btn').style.opacity = '0.3'
    document.getElementById('mic-btn').title = 'Speech not supported in this browser'
    return
  }
  recognition = new SR()
  recognition.continuous      = false
  recognition.interimResults  = false
  recognition.lang            = 'en-US'
  recognition.maxAlternatives = 3

  recognition.onresult = e => {
    // Try each alternative until we find a match
    for (let a=0; a < e.results[0].length; a++) {
      const heard = e.results[0][a].transcript.toLowerCase().trim()
      // Check full phrase first, then first word
      const cmd = VOICE_MAP[heard] || VOICE_MAP[heard.split(' ')[0]]
      if (cmd) {
        cmdChannel.postMessage({ type:'drive', cmd })
        showBubble(heardPhrase(cmd))
        applyMood(cmd==='S' ? 'happy' : 'moving')
        if (cmd!=='S') setTimeout(()=>{ applyMood('happy') }, 2000)
        break
      }
    }
    stopMic()
  }

  recognition.onerror = () => stopMic()
  recognition.onend   = () => stopMic()
}

function heardPhrase(cmd) {
  const map={F:'going forward!',B:'reversing!',L:'turning left!',R:'turning right!',S:'stopping!',H:'beep beep!'}
  return map[cmd] || 'ok!'
}

function toggleMic() {
  if (micActive) stopMic()
  else           startMic()
}

function startMic() {
  if (!recognition) return
  micActive = true
  document.getElementById('mic-btn').classList.add('listening')
  showBubble('listening...')
  try { recognition.start() } catch(e) { stopMic() }
}

function stopMic() {
  micActive = false
  document.getElementById('mic-btn').classList.remove('listening')
  try { recognition.stop() } catch(e) {}
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
setupSpeech()
applyMood('happy')
scheduleBlink()
scheduleIdle()
scheduleBubble()
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Buddy">
<meta name="theme-color" content="#FFD166">
<link rel="manifest" href="manifest.json">
<title>BUDDY</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; }

body {
  background: #FFD166;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.4s ease;
  position: relative;
  height: 100dvh;
}

#back-link {
  position: fixed;
  top: 18px; left: 20px;
  font-family: 'Courier New', monospace;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.15em;
  color: rgba(0,0,0,0.2);
  text-decoration: none;
  text-transform: uppercase;
  z-index: 10;
}
#back-link:active { color: rgba(0,0,0,0.5); }

#mood-name {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Courier New', monospace;
  font-size: 11px; letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.18);
  z-index: 10;
  pointer-events: none;
  white-space: nowrap;
}

/* Long-press hint — fades in briefly on face swap */
#swap-hint {
  position: fixed;
  top: 18px; right: 20px;
  font-family: 'Courier New', monospace;
  font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.18);
  z-index: 10;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
}
#swap-hint.show { opacity: 1; }

#face-wrap {
  width: min(82vw, 82vh);
  height: min(82vw, 82vh);
  position: relative;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

/* Both SVGs sit in the same slot — only one visible at a time */
.face-svg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  transition: opacity 0.3s;
}
.face-svg.hidden { opacity: 0; pointer-events: none; }

/* Flash ring on face swap */
#flash-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,0);
  pointer-events: none;
  transition: border-color 0.15s;
  z-index: 5;
}
#flash-ring.flash { border-color: rgba(255,255,255,0.8); }
</style>
</head>
<body>

<a id="back-link" href="index.html">← unit-01</a>
<div id="swap-hint">face swapped</div>

<div id="face-wrap">
  <div id="flash-ring"></div>

  <!-- ══════════════════════════════════════════
       FACE A — HELLO KITTY
       ══════════════════════════════════════════ -->
  <svg class="face-svg" id="face-kitty" viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg">

    <polygon id="k-ear-l" points="30,72 48,30 68,72" fill="#FFFFFF"/>

    <!-- angry brows — hidden by default -->

    </g>

    <rect id="k-head" x="18" y="60" width="164" height="138" rx="36" fill="#FFFFFF"/>

    <ellipse id="k-cheek-l" cx="38"  cy="148" rx="16" ry="11" fill="#FFB3C6" opacity="0"/>
    <ellipse id="k-cheek-r" cx="162" cy="148" rx="16" ry="11" fill="#FFB3C6" opacity="0"/>

      <line x1="21" y1="101" x2="31" y2="111" stroke="#FF9AAC" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="31" y1="101" x2="21" y2="111" stroke="#FF9AAC" stroke-width="1.5" stroke-linecap="round"/>

      <line x1="174" y1="100" x2="174" y2="112" stroke="#FF9AAC" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="168" y1="106" x2="180" y2="106" stroke="#FF9AAC" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="169" y1="101" x2="179" y2="111" stroke="#FF9AAC" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="179" y1="101" x2="169" y2="111" stroke="#FF9AAC" stroke-width="1.5" stroke-linecap="round"/>

      <text x="158" y="108" font-family="Arial" font-size="13" fill="#9090C0" opacity="0.7">z</text>

  </svg>

  <!-- ══════════════════════════════════════════
       FACE B — GUMBALL
       ══════════════════════════════════════════ -->
  <svg class="face-svg hidden" id="face-gumball" viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg">

    <!-- Round head — no ears, full circle shape -->
    <ellipse id="g-head" cx="100" cy="112" rx="88" ry="92" fill="#FFFFFF"/>

    <!-- Cheeks -->
    <ellipse id="g-cheek-l" cx="30"  cy="140" rx="18" ry="13" fill="#FFB3C6" opacity="0"/>
    <ellipse id="g-cheek-r" cx="170" cy="140" rx="18" ry="13" fill="#FFB3C6" opacity="0"/>

    <!-- BROWS — Gumball's thick expressive brows -->
    <rect id="g-brow-l" x="42" y="82" width="52" height="9" rx="4.5" fill="#2C2C2A"/>
    <rect id="g-brow-r" x="106" y="82" width="52" height="9" rx="4.5" fill="#2C2C2A"/>

    <g id="g-eye-l">
      <ellipse id="g-eyeball-l" cx="68"  cy="118" rx="22" ry="26" fill="#2C2C2A"/>

    <!-- mouth visible group for easy hide -->

    </g>

    <ellipse id="g-nose" cx="100" cy="150" rx="5" ry="4" fill="#2C2C2A" opacity="0.15"/>

    <g id="g-angry-brows" opacity="0">

      <rect x="106" y="86" width="52" height="11" rx="5" fill="#2C2C2A" transform="rotate(-14,132,91)"/>
    </g>

    <!-- ZZZ -->
    <g id="g-zzz" opacity="0">
      <text x="158" y="80" font-family="Arial" font-size="13" fill="#9090C0" opacity="0.7">z</text>
      <text x="167" y="64" font-family="Arial" font-size="16" fill="#9090C0" opacity="0.5">z</text>
      <text x="178" y="46" font-family="Arial" font-size="20" fill="#9090C0" opacity="0.35">z</text>

    <!-- Sparkles -->

      <line x1="22" y1="90" x2="22" y2="104" stroke="#FF9AAC" stroke-width="3" stroke-linecap="round"/>
      <line x1="15" y1="97" x2="29" y2="97"  stroke="#FF9AAC" stroke-width="3" stroke-linecap="round"/>
      <line x1="16" y1="91" x2="28" y2="103" stroke="#FF9AAC" stroke-width="2" stroke-linecap="round"/>
      <line x1="28" y1="91" x2="16" y2="103" stroke="#FF9AAC" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g id="g-sparkle-r" opacity="0">
      <line x1="178" y1="90" x2="178" y2="104" stroke="#FF9AAC" stroke-width="3" stroke-linecap="round"/>
      <line x1="171" y1="97" x2="185" y2="97"  stroke="#FF9AAC" stroke-width="3" stroke-linecap="round"/>
      <line x1="172" y1="91" x2="184" y2="103" stroke="#FF9AAC" stroke-width="2" stroke-linecap="round"/>
      <line x1="184" y1="91" x2="172" y2="103" stroke="#FF9AAC" stroke-width="2" stroke-linecap="round"/>

  </svg>
</div>

<div id="mood-name">happy</div>

<script>
// ══════════════════════════════════════════════════════════════
//  SHARED MOOD DEFINITIONS
//  Both faces read the same mood table.
//  Keys used by Kitty:    eyeLry/Rry, lidH, cheekOp,
//                         bowFill, bowKnot, sparkOp, zzzOp, sweatOp
//  Keys used by Gumball:  eyeLry/Rry (height), lidH, cheekOp,
//                         browRotL/R, mouthOp, teethOp, tongueOp,
//                         sparkOp, zzzOp, sweatOp
//  bg and label are shared.
// ══════════════════════════════════════════════════════════════
const MOODS = {
  happy: {
    bg:'#FFD166',
    eyeLry:18, eyeRry:18, lidH:2, cheekOp:0,
    bowFill:'#FF9AAC', bowKnot:'#FF6B8A',
    browRotL:0, browRotR:0,
    mouthScale:1, mouthOp:1, teethOp:1, tongueOp:1,
    sparkOp:0, zzzOp:0, sweatOp:0,
    label:'happy',
  },
  excited: {
    bg:'#FFD166',
    eyeLry:22, eyeRry:22, lidH:2, cheekOp:0.7,
    bowFill:'#FF6B8A', bowKnot:'#E8445A',
    browRotL:0, browRotR:0,
    mouthScale:1.1, mouthOp:1, teethOp:1, tongueOp:1,
    sparkOp:0, zzzOp:0, sweatOp:0,
    label:'excited!',
  },
  thinking: {
    bg:'#C7EFCF',
    eyeLry:14, eyeRry:16, lidH:8, cheekOp:0,
    bowFill:'#A8D8B0', bowKnot:'#6DBF7E',
    browRotL:-4, browRotR:4,
    mouthScale:0.6, mouthOp:0.7, teethOp:0, tongueOp:0,
    sparkOp:0, zzzOp:0, sweatOp:0,
    label:'thinking...',
  },
  sleepy: {
    bg:'#B8C0FF',
    eyeLry:7, eyeRry:7, lidH:20, cheekOp:0,
    bowFill:'#C0C8FF', bowKnot:'#9098E8',
    browRotL:0, browRotR:0,
    mouthScale:0.5, mouthOp:0.5, teethOp:0, tongueOp:0,
    sparkOp:0, zzzOp:1, sweatOp:0,
    label:'sleepy zzz',
  },
  surprised: {
    bg:'#FFBE7B',
    eyeLry:24, eyeRry:24, lidH:2, cheekOp:0.5,
    bowFill:'#FFB347', bowKnot:'#E8922A',
    browRotL:6, browRotR:-6,
    mouthScale:0.7, mouthOp:1, teethOp:0, tongueOp:0,
    sparkOp:0, zzzOp:0, sweatOp:1,
    label:'woah!',
  },
  love: {
    bg:'#FFB3C6',
    eyeLry:18, eyeRry:18, lidH:2, cheekOp:0.85,
    bowFill:'#FF6B8A', bowKnot:'#E8445A',
    browRotL:0, browRotR:0,
    mouthScale:1, mouthOp:1, teethOp:1, tongueOp:1,
    sparkOp:1, zzzOp:0, sweatOp:0,
    label:'hehe',
  },
  moving: {
    bg:'#A8E6CF',
    eyeLry:16, eyeRry:16, lidH:5, cheekOp:0.4,
    bowFill:'#6DBF9E', bowKnot:'#3DAA7E',
    browRotL:-2, browRotR:2,
    mouthScale:0.9, mouthOp:1, teethOp:1, tongueOp:0,
    sparkOp:0, zzzOp:0, sweatOp:0,
    label:'vroom!',
  },
  sad: {
    bg:'#CFD8E8',
    eyeLry:13, eyeRry:13, lidH:12, cheekOp:0,
    bowFill:'#A0AEC0', bowKnot:'#718096',
    browRotL:5, browRotR:-5,
    mouthScale:0.6, mouthOp:0.8, teethOp:0, tongueOp:0,
    sparkOp:0, zzzOp:0, sweatOp:0,
    label:'aww...',
  },
  angry: {
    bg:'#FF6B6B',
    eyeLry:12, eyeRry:12, lidH:14, cheekOp:0,
    bowFill:'#CC2244', bowKnot:'#991133',
    browRotL:20, browRotR:-20,
    mouthScale:0.7, mouthOp:1, teethOp:1, tongueOp:0,
    sparkOp:0, zzzOp:0, sweatOp:0,
    label:'GRRRR!!',
  },
}

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let currentMood    = 'happy'
let currentFace    = 'kitty'   // 'kitty' | 'gumball'
let priorMood      = 'happy'   // mood before angry, to restore after
let isAngry        = false
let blinkTimer, idleTimer, angryTimer

// ══════════════════════════════════════════════════════════════
//  APPLY MOOD — routes to the right face renderer
// ══════════════════════════════════════════════════════════════
function applyMood(mood) {
  const m = MOODS[mood]
  if (!m) return
  currentMood = mood

  document.body.style.background = m.bg
  document.getElementById('mood-name').textContent = m.label
  document.querySelector('meta[name="theme-color"]').setAttribute('content', m.bg)

  if (currentFace === 'kitty') applyKitty(m)
  else                         applyGumball(m)
}

// ── KITTY RENDERER ────────────────────────────────────────────
function applyKitty(m) {
  const bg = m.bg
  sa('k-lid-l', 'fill', bg); sa('k-lid-r', 'fill', bg)
  sa('k-lid-l', 'height', m.lidH); sa('k-lid-r', 'height', m.lidH)
  sa('k-eyeball-l', 'ry', m.eyeLry); sa('k-eyeball-r', 'ry', m.eyeRry)
  sa('k-shine-l', 'cy', 130 - m.eyeLry * 0.4)
  sa('k-shine-r', 'cy', 130 - m.eyeRry * 0.4)
  sa('k-cheek-l', 'opacity', m.cheekOp); sa('k-cheek-r', 'opacity', m.cheekOp)
  document.querySelectorAll('#k-bow ellipse').forEach(el => el.setAttribute('fill', m.bowFill))
  document.querySelector('#k-bow circle').setAttribute('fill', m.bowKnot)
  document.querySelectorAll('#k-sparkle-l line,#k-sparkle-r line').forEach(l => l.setAttribute('stroke', m.bowFill))
  sa('k-sparkle-l','opacity',m.sparkOp); sa('k-sparkle-r','opacity',m.sparkOp)
  sa('k-zzz','opacity',m.zzzOp); sa('k-sweat','opacity',m.sweatOp)
  // Angry brows on kitty — use browRotL as a proxy: >10 = angry
  sa('k-angry-brows','opacity', Math.abs(m.browRotL) >= 20 ? 1 : 0)
}

// ── GUMBALL RENDERER ──────────────────────────────────────────
function applyGumball(m) {
  const bg = m.bg
  sa('g-lid-l','fill',bg); sa('g-lid-r','fill',bg)
  sa('g-lid-l','height',m.lidH); sa('g-lid-r','height',m.lidH)
  sa('g-eyeball-l','ry',m.eyeLry); sa('g-eyeball-r','ry',m.eyeRry)
  sa('g-shine-l','cy', 118 - m.eyeLry * 0.45)
  sa('g-shine-r','cy', 118 - m.eyeRry * 0.45)
  sa('g-cheek-l','opacity',m.cheekOp); sa('g-cheek-r','opacity',m.cheekOp)

  // Brow rotation — normal brows tilt with mood, angry brows swap in
  const isAngryMood = Math.abs(m.browRotL) >= 20
  sa('g-angry-brows','opacity', isAngryMood ? 1 : 0)
  // Normal brow tilt
  document.getElementById('g-brow-l').setAttribute('transform',
    isAngryMood ? '' : `rotate(${m.browRotL},68,86)`)
  document.getElementById('g-brow-r').setAttribute('transform',
    isAngryMood ? '' : `rotate(${m.browRotR},132,86)`)

  // Mouth — scale vertically via transform on the whole mouth group
  const mScale = m.mouthScale
  const mouthEl = document.getElementById('g-mouth-outer')
  // We translate to mouth centre (100,180), scale, translate back
  mouthEl.setAttribute('transform',
    `translate(100,175) scale(${mScale}) translate(-100,-175)`)
  sa('g-mouth-outer','opacity',m.mouthOp)
  sa('g-teeth','opacity', m.teethOp * m.mouthOp)

  // Tongue transform matches mouth
  document.getElementById('g-tongue').setAttribute('transform',
    `translate(100,178) scale(${mScale}) translate(-100,-178)`)
  sa('g-tongue','opacity', m.tongueOp * m.mouthOp)

  sa('g-sparkle-l','opacity',m.sparkOp); sa('g-sparkle-r','opacity',m.sparkOp)
  sa('g-zzz','opacity',m.zzzOp); sa('g-sweat','opacity',m.sweatOp)
}

function sa(id, attr, val) {
  const el = document.getElementById(id)
  if (el) el.setAttribute(attr, val)
}

// ══════════════════════════════════════════════════════════════
//  FACE SWAP — called on long press
// ══════════════════════════════════════════════════════════════
function swapFace() {
  currentFace = currentFace === 'kitty' ? 'gumball' : 'kitty'

  document.getElementById('face-kitty').classList.toggle('hidden', currentFace !== 'kitty')
  document.getElementById('face-gumball').classList.toggle('hidden', currentFace !== 'gumball')

  // Flash ring feedback
  const ring = document.getElementById('flash-ring')
  ring.classList.add('flash')
  setTimeout(() => ring.classList.remove('flash'), 300)

  // Hint text
  const hint = document.getElementById('swap-hint')
  const name = currentFace === 'kitty' ? 'kitty mode' : 'gumball mode'
  hint.textContent = name
  hint.classList.add('show')
  setTimeout(() => hint.classList.remove('show'), 1800)

  // Re-apply current mood to new face
  applyMood(currentMood)
}

// ══════════════════════════════════════════════════════════════
//  ANGRY — double tap triggers, reverts after 5s
// ══════════════════════════════════════════════════════════════
function triggerAngry() {
  if (isAngry) return
  isAngry   = true
  priorMood = currentMood
  clearTimeout(idleTimer)
  clearTimeout(blinkTimer)
  applyMood('angry')
  angryTimer = setTimeout(() => {
    isAngry = false
    applyMood(priorMood)
    scheduleBlink()
    scheduleIdle()
  }, 5000)
}

// ══════════════════════════════════════════════════════════════
//  BLINK — works for both faces via lid height
// ══════════════════════════════════════════════════════════════
function blink() {
  if (currentMood === 'sleepy' || isAngry) return
  const m = MOODS[currentMood]
  const maxClose = Math.max(m.eyeLry * 1.1, 18)
  const frames   = [2, 6, 14, maxClose, 14, 6, 2]
  const prefix   = currentFace === 'kitty' ? 'k' : 'g'
  let i = 0
  const t = setInterval(() => {
    sa(`${prefix}-lid-l`, 'height', frames[i])
    sa(`${prefix}-lid-r`, 'height', frames[i])
    i++
    if (i >= frames.length) {
      clearInterval(t)
      sa(`${prefix}-lid-l`, 'height', m.lidH)
      sa(`${prefix}-lid-r`, 'height', m.lidH)
    }
  }, 32)
}

function scheduleBlink() {
  clearTimeout(blinkTimer)
  blinkTimer = setTimeout(() => { blink(); scheduleBlink() }, 2500 + Math.random() * 3000)
}

// ══════════════════════════════════════════════════════════════
//  IDLE DRIFT
// ══════════════════════════════════════════════════════════════
function scheduleIdle() {
  clearTimeout(idleTimer)
  idleTimer = setTimeout(() => {
    if (!isAngry && currentMood === 'happy') {
      const pick = Math.random() < 0.5 ? 'thinking' : 'sleepy'
      applyMood(pick)
      setTimeout(() => { applyMood('happy'); scheduleIdle() }, 4000)
    } else {
      scheduleIdle()
    }
  }, 10000 + Math.random() * 8000)
}

// ══════════════════════════════════════════════════════════════
//  GESTURE DETECTION
//  — Single tap  → random positive reaction
//  — Double tap  → angry
//  — Long press  → swap face
// ══════════════════════════════════════════════════════════════
const TAP_MOODS  = ['excited', 'surprised', 'love']
let tapCount     = 0
let tapTimer     = null
let tapLock      = false
let pressTimer   = null
let pressStarted = false

const LONG_PRESS_MS  = 600
const DOUBLE_TAP_MS  = 300

const wrap = document.getElementById('face-wrap')

wrap.addEventListener('pointerdown', e => {
  e.preventDefault()
  pressStarted = true
  pressTimer = setTimeout(() => {
    // Long press fired — cancel any pending tap logic
    pressStarted = false
    tapCount = 0
    clearTimeout(tapTimer)
    swapFace()
  }, LONG_PRESS_MS)
})

wrap.addEventListener('pointerup', e => {
  e.preventDefault()
  if (!pressStarted) return
  clearTimeout(pressTimer)
  pressStarted = false

  // Count taps
  tapCount++
  clearTimeout(tapTimer)

  tapTimer = setTimeout(() => {
    const count = tapCount
    tapCount = 0

    if (count >= 2) {
      // Double tap → angry
      triggerAngry()
    } else {
      // Single tap → reaction
      if (tapLock || isAngry) return
      tapLock = true
      clearTimeout(idleTimer)
      const r = TAP_MOODS[Math.floor(Math.random() * TAP_MOODS.length)]
      applyMood(r)
      setTimeout(() => {
        applyMood('happy')
        scheduleIdle()
        tapLock = false
      }, 2000)
    }
  }, DOUBLE_TAP_MS)
})

wrap.addEventListener('pointercancel', () => {
  clearTimeout(pressTimer)
  pressStarted = false
})

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
applyMood('happy')
scheduleBlink()
scheduleIdle()
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BLE Test</title>
<style>
  body { background:#111; color:#fff; font-family:sans-serif; padding:40px; }
  button { padding:16px 32px; font-size:18px; margin:8px; border:none; border-radius:12px; cursor:pointer; }
  #log { margin-top:24px; font-size:13px; color:#aaa; line-height:2; }
</style>
</head>
<body>
  <button onclick="connect()" style="background:#6d28d9">Connect</button>
  <br><br>
  <button onclick="sendCmd('F')" style="background:#1a4a1a">▲ Forward</button>
  <br>
  <button onclick="sendCmd('L')" style="background:#1a1a4a">◀ Left</button>
  <button onclick="sendCmd('S')" style="background:#4a1a1a">STOP</button>
  <button onclick="sendCmd('R')" style="background:#1a1a4a">Right ▶</button>
  <br>
  <button onclick="sendCmd('B')" style="background:#1a4a1a">▼ Back</button>
  <div id="log">Not connected</div>

<script>
let tx = null

function log(msg) {
  document.getElementById('log').innerHTML = msg + '<br>' + document.getElementById('log').innerHTML
}

async function connect() {
  try {
    log('Scanning...')
    const dev = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'BBC micro:bit' }],
      optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
    })
    log('Found: ' + dev.name)
    const server = await dev.gatt.connect()
    log('GATT connected')
    const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e')
    tx = await service.getCharacteristic('6e400003-b5a3-f393-e0a9-e50e24dcca9e')
    log('✅ Ready')
  } catch(e) {
    log('ERROR: ' + e.message)
  }
}

async function sendCmd(cmd) {
  if (!tx) { log('Not connected'); return }
  try {
    await tx.writeValue(new TextEncoder().encode(cmd + ','))
    log('Sent: ' + cmd)
  } catch(e) {
    log('Send error: ' + e.message)
  }
}
</script>
</body>
</html>
